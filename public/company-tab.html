<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Dane z NIP</title>
    <script src="//api.bitrix24.com/api/v1/"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 18px;
        line-height: 1.5;
        background: #fff;
      }

      .card {
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 20px;
        max-width: 900px;
      }

      h2 {
        margin-top: 0;
      }

      .row {
        margin-bottom: 14px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }

      input {
        width: 260px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
      }

      button {
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #2f7cf6;
        color: white;
        margin-right: 10px;
      }

      button.secondary {
        background: #14a44d;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #status {
        margin-top: 14px;
        white-space: pre-wrap;
      }

      .success {
        color: green;
      }

      .error {
        color: red;
      }

      .preview {
        margin-top: 18px;
        border: 1px solid #eee;
        border-radius: 10px;
        padding: 16px;
        background: #fafafa;
      }

      .preview h3 {
        margin-top: 0;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 8px 14px;
      }

      .preview-label {
        font-weight: 600;
        color: #555;
      }

      pre {
        background: #f7f7f7;
        padding: 12px;
        border-radius: 8px;
        overflow: auto;
        margin-top: 12px;
        min-height: 24px;
      }

      .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #888;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Dane firmy z NIP</h2>

      <div class="row">
        <label for="nipInput">NIP</label>
        <input id="nipInput" type="text" placeholder="Wpisz 10-cyfrowy NIP" />
      </div>

      <div class="row">
        <button id="fetchBtn">Pobierz dane z NIP</button>
        <button id="createCompanyBtn" class="secondary" disabled>
          Dodaj nową firmę do Bitrix24
        </button>
      </div>

      <div id="status"></div>

      <div id="previewBox" class="preview" style="display: none">
        <h3>Podgląd danych</h3>
        <div id="previewContent" class="preview-grid"></div>
      </div>

      <pre id="debug"></pre>

      <div class="footer">
        Developed by Marcin Bera Consulting
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
